name: Bug Report
description: Report a bug
title: "[BUG]: "
labels: ["bug"]

body:
  - type: textarea
    id: bug
    attributes:
      label: Bug Description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true