name: Bug Report
description: Something is broken
title: "[BUG]: "
labels: ["bug"]

body:
  - type: textarea
    id: bug
    attributes:
      label: Bug Description
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: input
    id: severity
    attributes:
      label: Severity
      placeholder: low / medium / high
    validations:
      required: true