name: PR Guard

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Issue Title Format
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/Closes\s+#(\d+)/i);

            if (!match) return;

            const issue_number = match[1];

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const title = issue.title || "";

            if (!/^\[(bug|task|feature)\]:/i.test(title)) {
              core.setFailed("Issue title must start with [BUG], [TASK], or [FEATURE].");
            }
      - name: Validate Linked Issue Quality
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/Closes\s+#(\d+)/i);

            if (!match) {
              core.setFailed("PR must link an issue using 'Closes #123'");
              return;
            }

            const issue_number = match[1];

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const issueBody = issue.body || "";

            const text = issueBody.toLowerCase().trim();

            // 1. Length check
            if (text.length < 120) {
              core.setFailed("Issue too short. Add meaningful details.");
              return;
            }

            // 2. Split into lines
            const sections = text
              .split(/\n+/)
              .map(s => s.trim())
              .filter(s => s.length > 0);

            const actualContent = sections.filter(s => !s.startsWith("###"));

            // 3. Garbage detection
            const isGarbage = actualContent.some(line => {
              return (
                line.length < 5 ||
                /^[a-z]{1,5}$/.test(line) ||
                /(test|123|aaa|bbb)/.test(line)
              );
            });

            if (isGarbage) {
              core.setFailed("Issue contains low-quality or placeholder content.");
              return;
            }

            // 4. Minimum meaningful lines
            if (actualContent.length < 3) {
              core.setFailed("Issue must contain detailed explanation.");
              return;
            }
